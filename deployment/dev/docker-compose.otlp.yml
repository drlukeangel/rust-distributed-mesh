services:
  jaeger-v2:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16687:16686"   # Jaeger UI (v2) — http://localhost:16687
      - "4327:4317"     # OTLP gRPC (v2) — gateway exports here
      - "4328:4318"     # OTLP HTTP (v2)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
