[workspace]
members = [
    "crates/rafka-telemetry",
    "crates/rafka-mesh-transport",
    "crates/rafka-mesh-ops",
    "crates/rafka-node-base",
    "crates/rafka-chaos",
    "gateway",
    "broker",
    "compute",
    "registry",
    "topology-ui",
    "cli/rfa",
]
resolver = "2"

[workspace.dependencies]
# async runtime
tokio = { version = "1", features = ["full"] }

# tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-opentelemetry = "0.28"

# opentelemetry
opentelemetry = { version = "0.27", features = ["trace"] }
opentelemetry_sdk = { version = "0.27", features = ["trace", "rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["tonic", "trace"] }
opentelemetry-semantic-conventions = "0.27"

# iroh — latest stable non-RC at sprint-02 open (0.35 was used in sprint-01;
# 1.0.0-rc.0 exists but is a release candidate; 0.95.1 is latest stable)
iroh = { version = "0.91", features = ["discovery-local-network"] }

# identity persistence
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# error handling
anyhow = "1"

# encoding
hex = "0.4"
rand = "0.8"
bincode = { version = "2", features = ["serde"] }
dashmap = "6"
